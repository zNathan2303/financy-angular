version: '3.8'

services:
  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: financy_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docker -d financy_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d/

  backend:
    build: ./backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/financy_db
      DB_USER: docker
      DB_PASSWORD: docker
      JWT_SECRET: chave-jwt-secreta
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "4200:4200"
    depends_on:
      - backend

volumes:
  postgres_data: